<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#00b4d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SCW Monitor">
  <link rel="manifest" href="manifest.json">
  <title>Scaleway Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --bg2:      #1a1a2e;
      --bg3:      #252540;
      --blue:     #00b4d8;
      --green:    #06d6a0;
      --orange:   #ff9f43;
      --red:      #ee5a24;
      --text:     #e0e0f0;
      --muted:    #8888aa;
      --radius:   14px;
      --nav-h:    64px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* Header */
    .header {
      padding: 16px 20px 12px;
      padding-top: max(16px, env(safe-area-inset-top));
      background: var(--bg2);
      border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: 700; color: var(--blue); }
    .header .refresh-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 20px; padding: 4px; border-radius: 8px; transition: color .2s;
    }
    .header .refresh-btn:hover { color: var(--blue); }
    .freshness { font-size: 11px; color: var(--muted); }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--nav-h) + 16px); }

    /* Navigation */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--bg2);
      border-top: 1px solid var(--bg3);
      display: flex;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; background: none; border: none;
      color: var(--muted); cursor: pointer; transition: color .2s; font-size: 11px;
    }
    .nav-btn .icon { font-size: 22px; }
    .nav-btn.active { color: var(--blue); }

    /* Cards */
    .card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 16px; margin-bottom: 12px; border: 1px solid var(--bg3);
    }
    .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .05em; margin-bottom: 8px; }
    .card-value { font-size: 32px; font-weight: 700; }
    .card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .row .card { flex: 1; margin-bottom: 0; }

    /* Couleurs valeurs */
    .val-blue   { color: var(--blue); }
    .val-green  { color: var(--green); }
    .val-orange { color: var(--orange); }
    .val-red    { color: var(--red); }

    /* Instance item */
    .item {
      background: var(--bg2); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--bg3);
      display: flex; align-items: center; gap: 12px;
    }
    .item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .item-dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .item-dot.stopped { background: var(--muted); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .item-cost { text-align: right; flex-shrink: 0; }
    .item-cost .main { font-size: 15px; font-weight: 600; }
    .item-cost .sub  { font-size: 11px; color: var(--muted); }

    /* Barre de stockage */
    .storage-bar { background: var(--bg3); border-radius: 4px; height: 8px; margin: 8px 0 4px; overflow: hidden; }
    .storage-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--green)); transition: width .5s; }

    /* Section title */
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin: 20px 0 10px; }

    /* Alert */
    .alert { background: rgba(238,90,36,.12); border: 1px solid rgba(238,90,36,.3);
      border-radius: var(--radius); padding: 12px 16px; margin-bottom: 12px;
      font-size: 13px; color: var(--orange); }

    /* Loading */
    .loading { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 200px; gap: 16px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--bg3);
      border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Écran vide */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .emoji { font-size: 48px; margin-bottom: 16px; }

    /* Tabs */
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>☁️ Scaleway Monitor</h1>
      <div class="freshness" id="freshness">Chargement…</div>
    </div>
    <button class="refresh-btn" onclick="loadData()" title="Actualiser">⟳</button>
  </div>

  <div class="content">
    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <div id="dashboard-content">
        <div class="loading"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>

    <!-- Instances -->
    <div class="page" id="page-instances">
      <div id="instances-content">
        <div class="loading"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>

    <!-- Stockage -->
    <div class="page" id="page-storage">
      <div id="storage-content">
        <div class="loading"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">
      <span class="icon">📊</span>Tableau
    </button>
    <button class="nav-btn" data-tab="instances" onclick="switchTab('instances')">
      <span class="icon">🖥️</span>Instances
    </button>
    <button class="nav-btn" data-tab="storage" onclick="switchTab('storage')">
      <span class="icon">💾</span>Stockage
    </button>
  </nav>
</div>

<script>
const BASE = location.hostname === 'localhost' ? '' : '/scaleway-monitor';
let data = null;

// ── Navigation ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
}

// ── Chargement données ──────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(`${BASE}/data/scaleway.json?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status);
    data = await r.json();
    renderAll();
  } catch(e) {
    showError();
  }
}

function showError() {
  const msg = `<div class="empty"><div class="emoji">⚠️</div>
    <div>Données indisponibles</div>
    <div style="font-size:13px;margin-top:8px;color:var(--muted)">Le cron GitHub Actions met à jour les données toutes les heures.</div></div>`;
  ['dashboard-content','instances-content','storage-content'].forEach(id => {
    document.getElementById(id).innerHTML = msg;
  });
}

// ── Helpers ─────────────────────────────────────────────────────────────
function eur(v) { return v.toFixed(2) + ' €'; }
function ago(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 2) return 'à l\'instant';
  if (diff < 60) return `il y a ${diff} min`;
  const h = Math.floor(diff / 60);
  return `il y a ${h}h${diff % 60 ? (diff%60)+'min' : ''}`;
}

// ── Render Dashboard ─────────────────────────────────────────────────────
function renderDashboard() {
  const d = data;
  const running = d.instances.filter(i => i.etat === 'running');
  const coutHoraire = running.reduce((s, i) => s + (i.tarif_heure || 0), 0);
  const jours = new Date().getDate();
  const projection = jours > 0 ? (d.cout_mois / jours) * 30 : 0;

  let alerts = '';
  if (running.length > 0)
    alerts += `<div class="alert">⚡ ${running.length} instance(s) en cours — ${coutHoraire.toFixed(3)} €/h</div>`;
  if (d.stockage.cout_total > 5)
    alerts += `<div class="alert">💾 Stockage permanent : ${eur(d.stockage.cout_total)}/mois</div>`;
  const libres = d.volumes.filter(v => !v.serveur);
  if (libres.length > 0)
    alerts += `<div class="alert">📦 ${libres.length} volume(s) non attaché(s) facturé(s) inutilement</div>`;

  document.getElementById('dashboard-content').innerHTML = `
    <div class="card">
      <div class="card-title">Coût du mois en cours</div>
      <div class="card-value val-blue">${eur(d.cout_mois)}</div>
      <div class="card-sub">Projection fin de mois : ~${eur(projection)}</div>
    </div>

    <div class="row">
      <div class="card">
        <div class="card-title">Instances</div>
        <div class="card-value val-${running.length > 0 ? 'orange' : 'green'}">${d.instances.length}</div>
        <div class="card-sub">${running.length} en cours</div>
      </div>
      <div class="card">
        <div class="card-title">Stockage</div>
        <div class="card-value val-blue">${eur(d.stockage.cout_total)}<span style="font-size:16px">/mois</span></div>
        <div class="card-sub">${(d.stockage.volumes_go + d.stockage.snaps_go + d.stockage.images_go).toFixed(0)} Go total</div>
      </div>
    </div>

    ${alerts || '<div class="card"><div class="card-title">Alertes</div><div style="color:var(--green);font-size:14px;margin-top:4px">✅ Aucune alerte</div></div>'}

    ${running.length > 0 ? `
    <div class="section-title">En cours</div>
    ${running.map(i => instanceItem(i)).join('')}` : ''}
  `;
}

// ── Render Instances ─────────────────────────────────────────────────────
function renderInstances() {
  const sorted = [...data.instances].sort((a,b) => (b.etat==='running')-(a.etat==='running'));
  document.getElementById('instances-content').innerHTML = sorted.length
    ? sorted.map(instanceItem).join('')
    : '<div class="empty"><div class="emoji">🖥️</div><div>Aucune instance</div></div>';
}

function instanceItem(i) {
  const running = i.etat === 'running';
  const costLabel = running
    ? `<div class="main val-orange">${(i.tarif_heure||0).toFixed(3)} €/h</div><div class="sub">en cours</div>`
    : `<div class="main val-muted" style="color:var(--muted)">arrêtée</div><div class="sub">0 €/h</div>`;
  return `
  <div class="item">
    <div class="item-dot ${i.etat === 'running' ? 'running' : 'stopped'}"></div>
    <div class="item-info">
      <div class="item-name">${i.nom}</div>
      <div class="item-type">${i.type} · ${i.zone || ''}</div>
      ${i.ip ? `<div class="item-type" style="color:var(--blue);font-size:11px">${i.ip}</div>` : ''}
    </div>
    <div class="item-cost">${costLabel}</div>
  </div>`;
}

// ── Render Stockage ──────────────────────────────────────────────────────
function renderStorage() {
  const s = data.stockage;
  const total_go = s.volumes_go + s.snaps_go + s.images_go;
  const max_go = Math.max(total_go, 1);

  const snap_html = data.snapshots.map(sn => `
  <div class="item">
    <div style="font-size:20px">📸</div>
    <div class="item-info">
      <div class="item-name">${sn.nom}</div>
      <div class="item-type">${sn.taille_go} Go · créé le ${sn.date}</div>
    </div>
    <div class="item-cost">
      <div class="main val-orange">${eur(sn.cout_mois)}</div>
      <div class="sub">/mois</div>
    </div>
  </div>`).join('');

  const vol_html = data.volumes.map(v => `
  <div class="item">
    <div style="font-size:20px">💿</div>
    <div class="item-info">
      <div class="item-name">${v.nom}</div>
      <div class="item-type">${v.taille_go} Go${v.serveur ? ` · ${v.serveur}` : ' · <span style="color:var(--red)">non attaché</span>'}</div>
    </div>
    <div class="item-cost">
      <div class="main val-orange">${eur(v.cout_mois)}</div>
      <div class="sub">/mois</div>
    </div>
  </div>`).join('');

  document.getElementById('storage-content').innerHTML = `
    <div class="card">
      <div class="card-title">Total stockage permanent</div>
      <div class="card-value val-orange">${eur(s.cout_total)}<span style="font-size:16px">/mois</span></div>
      <div class="storage-bar"><div class="storage-bar-fill" style="width:100%"></div></div>
      <div style="display:flex;gap:16px;font-size:12px;color:var(--muted)">
        <span>Volumes ${s.volumes_go} Go</span>
        <span>Snapshots ${s.snaps_go} Go</span>
        <span>Images ${s.images_go} Go</span>
      </div>
    </div>

    ${data.volumes.length ? `<div class="section-title">Volumes (${data.volumes.length})</div>${vol_html}` : ''}
    ${data.snapshots.length ? `<div class="section-title">Snapshots (${data.snapshots.length})</div>${snap_html}` : ''}
    ${!data.volumes.length && !data.snapshots.length ? '<div class="empty"><div class="emoji">💾</div><div>Aucune donnée de stockage</div></div>' : ''}
  `;
}

// ── Render All ───────────────────────────────────────────────────────────
function renderAll() {
  if (!data) return;
  document.getElementById('freshness').textContent = `Mis à jour ${ago(data.mis_a_jour)}`;
  renderDashboard();
  renderInstances();
  renderStorage();
}

// ── PWA Service Worker ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register(`${BASE}/sw.js`);
}

loadData();
</script>
</body>
</html>
